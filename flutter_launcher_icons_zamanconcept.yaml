# ZamanConcept — Launcher Icons Config
# Run with: dart run flutter_launcher_icons -f flutter_launcher_icons_zamanconcept.yaml
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "images/zamanconcept/logo.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "images/zamanconcept/logo.jpg"
  adaptive_icon_round: "images/zamanconcept/logo.jpg"
  flavor: zamanconcept
