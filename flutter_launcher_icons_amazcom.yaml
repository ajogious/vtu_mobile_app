# Amazcom — Launcher Icons Config
# Run with: dart run flutter_launcher_icons -f flutter_launcher_icons_amazcom.yaml
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "images/amazcom/logo.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "images/amazcom/logo.jpg"
  adaptive_icon_round: "images/amazcom/logo.jpg"
  flavor: amazcom
