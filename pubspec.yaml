name: vtu_mobile
description: A3TECH DATA - Fast & Reliable VTU Services

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Routing
  go_router: ^17.1.0

  # State management
  flutter_riverpod: ^3.2.1

  # Networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI helpers
  google_fonts: ^8.0.1
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  fluttertoast: ^9.0.0

  # Device / OS
  local_auth: ^3.0.0
  flutter_local_notifications: ^20.0.0
  connectivity_plus: ^7.0.0
  path_provider: ^2.1.1

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.2
  share_plus: ^12.0.1

  # PDF / Printing
  pdf: ^3.10.7
  printing: ^5.11.1

  # Payments
  provider: ^6.1.5+1
  permission_handler: ^12.0.1
  flutter_contacts: ^1.1.9+2
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1

  # Splash screen generator
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/logo.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "images/logo.jpg"
  adaptive_icon_round: "images/logo.jpg"

flutter_native_splash:
  color: "#665ED5"
  image: images/logo.jpg
  android_12:
    image: images/logo.jpg
    icon_background_color: "#665ED5"
    color: "#665ED5"
  ios: true
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - images/
