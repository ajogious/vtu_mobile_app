name: vtu_mobile
description: White-label VTU Services App

publish_to: "none"

version: 1.0.0+3

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Routing
  go_router: ^17.1.0

  # State management
  flutter_riverpod: ^3.2.1

  # Networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI helpers
  google_fonts: ^8.0.1
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  fluttertoast: ^9.0.0

  # Device / OS
  local_auth: ^3.0.0
  flutter_local_notifications: ^20.0.0
  connectivity_plus: ^7.0.0
  path_provider: ^2.1.1

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.2
  share_plus: ^12.0.1

  # PDF / Printing
  pdf: ^3.10.7
  printing: ^5.11.1

  # Payments & contacts
  provider: ^6.1.5+1
  permission_handler: ^12.0.1
  flutter_contacts: ^1.1.9+2
  package_info_plus: ^9.0.0
  webview_flutter: ^4.13.1

  flutter_native_splash: any

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1

# ---------------------------------------------------------------------------
# flutter_launcher_icons — run per flavor using override files:
#   dart run flutter_launcher_icons -f flutter_launcher_icons_a3tech.yaml
# The block below is kept as a fallback for the base a3tech flavor.
# ---------------------------------------------------------------------------
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/a3tech/logo.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "images/a3tech/logo.jpg"
  adaptive_icon_round: "images/a3tech/logo.jpg"

# ---------------------------------------------------------------------------
# flutter_native_splash — run per flavor using override files:
#   dart run flutter_native_splash:create --path=flutter_native_splash_a3tech.yaml
# The block below is kept as a fallback for the base a3tech flavor.
# ---------------------------------------------------------------------------
flutter_native_splash:
  color: "#665ED5"
  image: images/a3tech/logo.jpg
  android_12:
    image: images/a3tech/logo.jpg
    icon_background_color: "#665ED5"
    color: "#665ED5"
  ios: true
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - images/              # shared splash images (splash1.png – splash4.png)
    - images/a3tech/       # A3TECH DATA logo
    - images/amazcom/      # Amazcom logo
    - images/zamanconcept/ # ZamanConcept logo
    - images/azdigital/    # AzDigital logo
